name: docavailable-backend
services:
- name: laravel-backend
  source_dir: /backend
  github:
    repo: docavailable/docavailable
    branch: main
  environment_slug: php
  instance_count: 1
  instance_size_slug: basic-xxs
  http_port: 8000
  run_command: |
    cd backend
    echo "=== Starting Laravel application ==="
    echo "=== Current directory: $(pwd) ==="
    echo "=== Files in directory: $(ls -la) ==="
    echo "=== Checking if artisan exists: $(ls -la artisan) ==="
    php artisan config:clear
    php artisan cache:clear
    php artisan route:clear
    php artisan view:clear
    echo "=== Running migrations ==="
    php artisan migrate --force || echo "Migration failed, continuing anyway"
    echo "=== Starting server on port 8000 ==="
    php artisan serve --host=0.0.0.0 --port=8000
  envs:
  - key: APP_NAME
    value: DocAvailable
  - key: APP_ENV
    value: production
  - key: APP_DEBUG
    value: false
  - key: APP_URL
    value: ${APP_URL}
  - key: DB_CONNECTION
    value: ${DB_CONNECTION}
  - key: DB_HOST
    value: ${DB_HOST}
  - key: DB_PORT
    value: ${DB_PORT}
  - key: DB_DATABASE
    value: ${DB_DATABASE}
  - key: DB_USERNAME
    value: ${DB_USERNAME}
  - key: DB_PASSWORD
    value: ${DB_PASSWORD}
  - key: DB_URL
    value: ${DB_URL}
  - key: DB_SSLMODE
    value: ${DB_SSLMODE}
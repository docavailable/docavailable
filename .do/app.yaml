name: docavailable-backend
services:
- name: laravel-backend
  source_dir: /backend
  github:
    repo: docavailable/docavailable
    branch: main
  environment_slug: php
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: APP_NAME
    value: DocAvailable
  - key: APP_ENV
    value: production
  - key: APP_DEBUG
    value: false
  - key: APP_URL
    value: https://docavailable-backend.ondigitalocean.app
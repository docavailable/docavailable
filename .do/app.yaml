name: docavailable-backend
services:
- name: laravel-backend
  source_dir: /backend
  github:
    repo: docavailable/docavailable
    branch: main
  dockerfile_path: ./Dockerfile
  instance_count: 1
  instance_size_slug: basic-xxs
  http_port: 8000
  run_command: sh -c "cd backend && php artisan serve --host=0.0.0.0 --port=8000"
  envs:
  - key: APP_NAME
    value: DocAvailable
  - key: APP_ENV
    value: production
  - key: APP_DEBUG
    value: false
  - key: APP_URL
    value: ${APP_URL}
  - key: DB_CONNECTION
    value: ${DB_CONNECTION}
  - key: DB_HOST
    value: ${DB_HOST}
  - key: DB_PORT
    value: ${DB_PORT}
  - key: DB_DATABASE
    value: ${DB_DATABASE}
  - key: DB_USERNAME
    value: ${DB_USERNAME}
  - key: DB_PASSWORD
    value: ${DB_PASSWORD}
  - key: DB_URL
    value: ${DB_URL}
  - key: DB_SSLMODE
    value: ${DB_SSLMODE}